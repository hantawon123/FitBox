spring.application.name=spring_server

# spring-mybatis connection 
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/fitbox_db?serverTimezone=Asia/Seoul&useUniCode=yes&characterEncoding=UTF-8
spring.datasource.username=ssafy
spring.datasource.password=ssafy

#HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-test-query=select 1
spring.datasource.hikari.max-lifetime=1800000

# mybatis
mybatis.mapper-locations=mapper/**/*.xml
mybatis.type-aliases-package=com.ssafy.fitbox.dto

# Firebase Admin 서비스 계정 JSON의 절대 경로
# 환경 변수 FIREBASE_SERVICE_ACCOUNT_PATH로 설정하며 JSON 파일은 Git에 커밋하지 않습니다.
firebase.service-account.path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
